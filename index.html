<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="todo-container">
        <h1>To-Do List</h1>

        <div class="input-area">
            New task: <input type="text" id="task-input">
            <button id="add-btn">Add</button>
        </div>

        <ol id="task-list">
            <li><span class="task-text">Clean bathroom</span><button class="done-btn">&#10006;</button></li>
            <li><span class="task-text">Study for big exam</span><button class="done-btn">&#10006;</button></li>
            <li><span class="task-text">Feed fish</span><button class="done-btn">&#10006;</button></li>
        </ol>
    </div>

    <script src="script.js"></script>
</body>
</html>
